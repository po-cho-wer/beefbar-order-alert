name: 비프바 주간 리포트

on:
  # Cloudflare Workers로 이전 완료 (2026-05-26) — 정시 실행 보장
  # schedule:
  #   - cron: '0 1 * * 1'
  workflow_dispatch:       # 수동 실행은 유지 (긴급 시 사용)

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 주간 리포트 전송
        env:
          IMWEB_API_KEY: ${{ secrets.IMWEB_API_KEY }}
          IMWEB_SECRET_KEY: ${{ secrets.IMWEB_SECRET_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python weekly_summary.py
